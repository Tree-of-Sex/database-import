file:
  format: xlsx
  header: true
  name: B-chrom 2.0
  submitter: "B-chrom" # source in GoaT
  # source_date: 2021-03-03
  default reference header: "CompCitRef" # ignore if attributed have specific refernce values

taxonomy:
  species:
    header: SpName
  family:
    header: Family

attributes:
  - column_name: "ChromNum"
    destination:
      key: "Chromosome number (2N)"
      import:
        - integers

  - column_name: "PloidyLevel"
    destination:
      key: "ploidy"
      import:
        - integers

  - column_name: "BsRange"
    destination:
      key: "Accessory chromosomes"
      import:
        - integer ranges
      ignore:
        - Bs
